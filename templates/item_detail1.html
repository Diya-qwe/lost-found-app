<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🔍 Lost & Found - Item Details</h1>
            <div class="nav-links">
                <a href="javascript:history.back()" class="btn btn-outline">← Back</a>
                <a href="{{ url_for('my_messages1') }}" class="btn btn-outline">💬 Messages</a>
                <a href="{{ url_for('logout1') }}" class="btn btn-outline">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="itemDetail" class="detail-container"></div>
        
        <div class="chat-section">
            <h3>💬 Conversation</h3>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-group">
                <input type="text" id="chatInput" placeholder="Type your message...">
                <button id="sendBtn" class="btn btn-primary">Send</button>
            </div>
        </div>
    </div>

    <script>
        const itemId = {{ item_id }};
        let currentUser = null;
        let itemOwnerId = null;

        async function api(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin'
            });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function loadUser() {
            const res = await fetch('/api/me');
            currentUser = await res.json();
        }

        async function loadItem() {
            const item = await api('/api/items/' + itemId);
            itemOwnerId = item.owner_id;
            
            const container = document.getElementById('itemDetail');
            let imageHtml = '';
            if (item.image_path) {
                imageHtml = '<img src="/' + item.image_path + '" class="detail-image" style="width:100%; height:400px; object-fit:cover;">';
            } else {
                imageHtml = '<div class="detail-no-image">📷 No Image Available</div>';
            }
            
            let deleteButton = '';
            if (currentUser.role === 'admin') {
                deleteButton = '<button id="deleteBtn" class="btn btn-danger">🗑️ Delete Item</button>';
            }
            
            container.innerHTML = `
                <div class="detail-card">
                    ${imageHtml}
                    <div class="detail-info">
                        <h1>${item.title}</h1>
                        <p class="item-type ${item.type}">${item.type.toUpperCase()}</p>
                        <p><strong>📍 Location:</strong> ${item.location}</p>
                        <p><strong>📅 Date:</strong> ${item.date}</p>
                        <p><strong>📝 Description:</strong></p>
                        <p>${item.description}</p>
                        <p><small>Reported by ${item.owner_name} on ${new Date(item.created_at).toLocaleDateString()}</small></p>
                        ${deleteButton}
                    </div>
                </div>
            `;
            
            const deleteBtn = document.getElementById('deleteBtn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', async function() {
                    if (confirm('Delete this item?')) {
                        await api('/api/items/' + itemId, { method: 'DELETE' });
                        alert('Item deleted');
                        window.location.href = '/choose1';
                    }
                });
            }
            
            await loadMessages();
        }

        async function loadMessages() {
            const messages = await api('/api/messages?other_user=' + itemOwnerId + '&item_id=' + itemId);
            const container = document.getElementById('chatMessages');
            if (messages.length === 0) {
                container.innerHTML = '<p class="no-messages">No messages yet. Start the conversation!</p>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < messages.length; i++) {
                const msg = messages[i];
                const messageClass = msg.sender_id === currentUser.id ? 'sent' : 'received';
                const newBadge = (!msg.is_read && msg.sender_id !== currentUser.id) ? '<span style="font-size:10px; margin-left:10px;">📖 New</span>' : '';
                html = html + `
                    <div class="message ${messageClass}">
                        <strong>${msg.sender_name}:</strong><br>
                        ${msg.content}<br>
                        <small>${new Date(msg.created_at).toLocaleString()}</small>
                        ${newBadge}
                    </div>
                `;
            }
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const content = document.getElementById('chatInput').value;
            if (!content.trim()) return;
            
            await api('/api/messages', {
                method: 'POST',
                body: JSON.stringify({
                    receiver_id: itemOwnerId,
                    item_id: itemId,
                    content: content
                })
            });
            document.getElementById('chatInput').value = '';
            await loadMessages();
        }

        const sendBtn = document.getElementById('sendBtn');
        const chatInput = document.getElementById('chatInput');
        
        if (sendBtn) {
            sendBtn.addEventListener('click', sendMessage);
        }
        if (chatInput) {
            chatInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendMessage();
            });
        }
        
        loadUser();
        loadItem();
    </script>
</body>
</html>
