<script>
    let currentUser = null;

    async function api(url, options = {}) {
        const res = await fetch(url, {
            ...options,
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin'
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function loadUser() {
        const res = await fetch('/api/me');
        currentUser = await res.json();
    }

    async function loadItems() {
        const search = document.getElementById('searchInput').value;
        const location = document.getElementById('locationFilter').value;
        let url = '/api/items?type=lost';
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (location) url += `&location=${encodeURIComponent(location)}`;
        
        const items = await api(url);
        const container = document.getElementById('itemsContainer');
        if (items.length === 0) {
            container.innerHTML = '<div class="no-items">No lost items found. <a href="{{ url_for('report_lost1') }}">Report one now?</a></div>';
            return;
        }
        container.innerHTML = items.map(item => `
            <div class="item-card">
                ${item.image_path ? `<img src="/${item.image_path}" alt="Item" style="width:100%; height:200px; object-fit:cover;">` : '<div class="no-image">📷 No Image</div>'}
                <h3>${item.title}</h3>
                <p><strong>📍 Location:</strong> ${item.location}</p>
                <p>${item.description.substring(0, 100)}...</p>
                <p><small>Reported by ${item.owner_name}</small></p>
                <a href="/item_detail1/${item.id}" class="btn btn-primary">View & Message</a>
            </div>
        `).join('');
    }

    document.getElementById('searchBtn').addEventListener('click', loadItems);
    loadUser();
    loadItems();
</script>
