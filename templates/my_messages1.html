<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Messages</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
    <style>
        .conversation-card {
            background: var(--white);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 5px solid var(--navy);
        }
        .conversation-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .conversation-card.unread {
            background: #e8f0fe;
            border-left-color: var(--success);
        }
        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .conversation-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--navy);
        }
        .conversation-item {
            font-size: 0.9rem;
            color: var(--gray-dark);
            margin-bottom: 8px;
        }
        .conversation-last {
            font-size: 0.85rem;
            color: var(--gray-dark);
            font-style: italic;
        }
        .unread-badge {
            background: var(--success);
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .no-conversations {
            text-align: center;
            padding: 60px;
            background: var(--white);
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🔍 Lost & Found - My Messages</h1>
            <div class="nav-links">
                <a href="{{ url_for('choose1') }}" class="btn btn-outline">← Back</a>
                <a href="{{ url_for('my_items1') }}" class="btn btn-outline">📦 My Items</a>
                <a href="{{ url_for('logout1') }}" class="btn btn-outline">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>💬 My Conversations</h1>
            <p>Messages about your items and items you've inquired about</p>
        </div>

        <div id="conversationsContainer"></div>
    </div>

    <script>
        async function api(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin'
            });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function loadConversations() {
            const conversations = await api('/api/my_conversations');
            const container = document.getElementById('conversationsContainer');
            
            if (conversations.length === 0) {
                container.innerHTML = '<div class="no-conversations">💬 No conversations yet. When you message someone about an item, it will appear here!</div>';
                return;
            }
            
            container.innerHTML = conversations.map(conv => `
                <div class="conversation-card ${conv.unread_count > 0 ? 'unread' : ''}" onclick="window.location.href='/item_detail1/${conv.item_id}'">
                    <div class="conversation-header">
                        <span class="conversation-title">${conv.other_user_name}</span>
                        ${conv.unread_count > 0 ? `<span class="unread-badge">${conv.unread_count} new</span>` : ''}
                    </div>
                    <div class="conversation-item">📦 ${conv.item_title}</div>
                    <div class="conversation-last">
                        ${conv.is_from_me ? 'You: ' : ''}${conv.last_message.substring(0, 60)}${conv.last_message.length > 60 ? '...' : ''}
                    </div>
                    <div class="conversation-last">📅 ${new Date(conv.last_message_time).toLocaleString()}</div>
                </div>
            `).join('');
        }

        loadConversations();
        
        // Refresh every 30 seconds
        setInterval(loadConversations, 30000);
    </script>
</body>
</html>
